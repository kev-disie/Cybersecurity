<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="bg"></div>
  <main class="shell center page-shell">
    <section class="panel page-panel narrow">
      <div class="tabs">
        <a class="tab" href="{{ url_for('index') }}">Create account</a>
        <a class="tab active" href="{{ url_for('login_page') }}">Sign in</a>
      </div>
      <div class="brand">Northstar Workspace</div>
      <h2>Sign in</h2>
      <p class="intro-copy">Use your workspace credentials to continue.</p>
      {% if notice %}
      <section class="auth-card">
        <div class="auth-title">{{ notice.title }}</div>
        <div class="auth-copy">{{ notice.message }}</div>
      </section>
      {% endif %}
      <form id="loginForm" class="stack auth-stack">
        <input name="username" type="text" placeholder="Username" autocomplete="off" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Sign in</button>
      </form>
      <div id="status" class="status"></div>
    </section>
  </main>
<script>
const form = document.getElementById('loginForm')
const statusBox = document.getElementById('status')
form.addEventListener('submit', async (e) => {
  e.preventDefault()
  statusBox.textContent = ''
  const payload = Object.fromEntries(new FormData(form).entries())
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  })
  const data = await res.json()
  if (!res.ok) {
    statusBox.textContent = data.error || 'Unable to sign in.'
    return
  }
  window.location.href = data.redirect || '/dashboard'
})
</script>
</body>
</html>
